
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="estilos.css">

    <title>CRUD</title>
</head>

<body class="bg-light">

    <div class="container mt-5">

        <h1 class="mb-4 text-center color-primario">Gestión de Préstamos</h1>

        <!-- CARD DEL FORMULARIO -->
        <div class="card sombra-suave redondeado mb-4">
            <div class="card-body">

                <h4 class="mb-3">Nueva solicitud</h4>

                <div class="row g-3">

                    <!-- Nombre -->
                    <div class="col-md-6">
                        <label for="nombrePersona" class="form-label">Nombre del alumno</label>
                        <input type="text" id="nombrePersona" class="form-control" placeholder="Escribe tu nombre">
                    </div>

                    <!-- Actividad -->
                    <div class="col-md-6">
                        <label for="actividadSeleccionada" class="form-label">Material</label>
                        <select id="actividadSeleccionada" class="form-select">
                            <option value="">Selecciona el material de préstamo</option>
                            <option value="Robotica">Cargadores</option>
                            <option value="DiseñoWeb">Ratones</option>
                            <option value="Ofimatica">Portátiles</option>
                            <option value="Edicion">Otros</option>
                        </select>
                    </div>

                    <!-- Turno -->
                    <div class="col-md-6">
                        <label class="form-label">Turno</label>

                        <div class="form-check">
                            <input type="radio" name="turnoActividad" id="turnoMañana" value="Mañana"
                                class="form-check-input">
                            <label for="turnoMañana" class="form-check-label">Mañana</label>
                        </div>

                        <div class="form-check">
                            <input type="radio" name="turnoActividad" id="turnoTarde" value="Tarde"
                                class="form-check-input">
                            <label for="turnoTarde" class="form-check-label">Tarde</label>
                        </div>
                    </div>

                    <!-- Devolución -->
                    <div class="col-md-6">
                        <label class="form-label">Devolución</label>

                        <div class="form-check">
                            <input type="radio" name="Devoluciones" id="devuelto" value="Devuelto"
                                class="form-check-input">
                            <label for="devuelto" class="form-check-label">Devuelto</label>
                        </div>

                        <div class="form-check">
                            <input type="radio" name="Devoluciones" id="pendiente" value="Pendiente"
                                class="form-check-input">
                            <label for="pendiente" class="form-check-label">Pendiente</label>
                        </div>
                    </div>

                </div>

                <!-- Botón -->
                <div class="mt-4">
                    <button type="button" id="botonGuardar" class="btn btn-outline-info">Enviar solicitud</button>
                </div>

            </div>
        </div>

        <!-- TABLA -->
        <h2 class="mb-3">Lista de inscripciones</h2>

        <div class="table-responsive sombra-suave redondeado">
            <table class="table table-striped table-bordered align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Persona</th>
                        <th>Actividad</th>
                        <th>Turno</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTablaInscripciones"></tbody>
            </table>
        </div>

    </div>

    <script src="crud.js"></script>

</body>

</html>
